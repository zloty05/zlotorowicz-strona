<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Tło: głęboki atramentowy granat (kontrast do złota) -->
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#202A45"/>
      <stop offset="1" stop-color="#141B2E"/>
    </linearGradient>
    <!-- Błyskawica: złoty gradient -->
    <linearGradient id="bolt" x1="22" y1="8" x2="42" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E9C45A"/>
      <stop offset="0.5" stop-color="#C4992A"/>
      <stop offset="1" stop-color="#A07A18"/>
    </linearGradient>
    <!-- Blask pod błyskawicą -->
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#D4AA3A" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#D4AA3A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Kafelek -->
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>
  <!-- Subtelny złoty obrys -->
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="14.25" fill="none" stroke="#C4992A" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- Poświata -->
  <circle cx="32" cy="30" r="22" fill="url(#glow)"/>

  <!-- Błyskawica -->
  <path
    d="M36.5 8 L20 35 H29.5 L27 56 L45 26 H34.5 L40.5 8 Z"
    fill="url(#bolt)"
    stroke="#F1DA94"
    stroke-width="1.1"
    stroke-linejoin="round"
  />
</svg>
